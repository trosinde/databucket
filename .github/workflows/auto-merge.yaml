name: Auto-merge development → main

on:
  push:
    branches: [development]

jobs:
  test:
    uses: ./.github/workflows/ci.yaml

  merge-to-main:
    runs-on: ubuntu-latest
    needs: test
    if: success()

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge development into main
        run: |
          git checkout main
          git merge origin/development --no-edit
          git push origin main

      - name: Summary
        run: |
          echo "## Auto-merged development → main" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All tests passed. Development branch merged into main (stable)." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: $(git rev-parse --short HEAD)" >> $GITHUB_STEP_SUMMARY
