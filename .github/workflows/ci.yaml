name: CI

on:
  push:
    branches: [development]
  pull_request:
    branches: [development]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Shellcheck
        run: |
          sudo apt-get install -y shellcheck
          shellcheck databucket install.sh scripts/test.sh

      - name: Python syntax check
        run: |
          python -m py_compile mcp-server/server.py
          python -m py_compile indexer/server.py
          python -m py_compile indexer/extractors.py
          python -m py_compile tests/conftest.py
          python -m py_compile tests/test_mcp_server.py
          python -m py_compile tests/test_cli_e2e.py
          python -m py_compile tests/test_indexer.py
          python -m py_compile tests/test_extractors.py

  e2e-pve3:
    runs-on: [self-hosted, pve3]
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Deploy and test
        run: |
          set -euo pipefail
          export PATH="/usr/local/bin:$PATH"

          # Update installed files
          sudo cp databucket /usr/local/bin/databucket
          sudo cp mcp-server/* /opt/databucket/mcp-server/
          sudo cp docker-compose.yaml /opt/databucket/
          sudo cp -r indexer /opt/databucket/

          # Rebuild and restart
          cd /opt/databucket
          sudo docker compose build
          sudo docker compose up -d

          # Wait for healthy
          for _i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          # Create test environment for CLI
          TEST_HOME=$(mktemp -d)
          cp /opt/databucket/docker-compose.yaml "$TEST_HOME/"
          printf 'MINIO_ROOT_USER=admin\nMINIO_ROOT_PASSWORD=databucket-test-2026!\nMINIO_API_PORT=9000\nMINIO_CONSOLE_PORT=9001\nINDEXER_PORT=8900\n' > "$TEST_HOME/.env"

          # Run e2e tests
          cd ${{ github.workspace }}
          export S3_ENDPOINT=http://localhost:9000
          export S3_ACCESS_KEY=admin
          export S3_SECRET_KEY='databucket-test-2026!'
          export DATABUCKET_HOME="$TEST_HOME"

          python3 -m pytest tests/test_mcp_server.py tests/test_cli_e2e.py -v

          rm -rf "$TEST_HOME"

  auto-merge:
    runs-on: ubuntu-latest
    needs: e2e-pve3
    if: github.ref == 'refs/heads/development' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge development into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge origin/development --no-edit
          git push origin main

      - name: Summary
        run: |
          echo "## Auto-merged development → main" >> $GITHUB_STEP_SUMMARY
          echo "All e2e tests passed on pve3. Development merged into main (stable)." >> $GITHUB_STEP_SUMMARY
