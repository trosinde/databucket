name: CI

on:
  push:
    branches: [development]
  pull_request:
    branches: [development]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Shellcheck
        run: |
          sudo apt-get install -y shellcheck
          shellcheck databucket install.sh scripts/test.sh

      - name: Python syntax check
        run: |
          python -m py_compile mcp-server/server.py
          python -m py_compile indexer/server.py
          python -m py_compile indexer/extractors.py
          python -m py_compile tests/conftest.py
          python -m py_compile tests/test_mcp_server.py
          python -m py_compile tests/test_cli_e2e.py
          python -m py_compile tests/test_indexer.py

  e2e-pve3:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Deploy and test on pve3
        env:
          PVE3_SSH_KEY: ${{ secrets.PVE3_SSH_KEY }}
          PVE3_HOST: ${{ secrets.PVE3_HOST }}
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$PVE3_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "Host pve3-databucket" >> ~/.ssh/config
          echo "  HostName $PVE3_HOST" >> ~/.ssh/config
          echo "  User root" >> ~/.ssh/config
          echo "  IdentityFile ~/.ssh/deploy_key" >> ~/.ssh/config
          echo "  IdentitiesOnly yes" >> ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config

          # Sync code to test system
          rsync -avz --delete \
            --exclude='.git' --exclude='.ssh' --exclude='.env' \
            --exclude='__pycache__' --exclude='.aios' --exclude='.claude' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ pve3-databucket:/root/databucket/

          # Deploy updated code
          ssh pve3-databucket bash <<'EOF'
          set -euo pipefail
          export PATH="/usr/local/bin:$PATH"

          # Update installed files
          cp /root/databucket/databucket /usr/local/bin/databucket
          cp /root/databucket/mcp-server/* /opt/databucket/mcp-server/
          cp /root/databucket/docker-compose.yaml /opt/databucket/

          # Rebuild and restart
          cd /opt/databucket
          docker compose build mcp-server
          docker compose up -d

          # Wait for healthy
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          # Run e2e tests
          cd /root/databucket
          export S3_ENDPOINT=http://localhost:9000
          export S3_ACCESS_KEY=admin
          export S3_SECRET_KEY='databucket-test-2026!'
          export DATABUCKET_HOME=/opt/databucket

          python3 -m pytest tests/test_mcp_server.py tests/test_cli_e2e.py -v
          EOF

  auto-merge:
    runs-on: ubuntu-latest
    needs: e2e-pve3
    if: github.ref == 'refs/heads/development' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge development into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge origin/development --no-edit
          git push origin main

      - name: Summary
        run: |
          echo "## Auto-merged development → main" >> $GITHUB_STEP_SUMMARY
          echo "All e2e tests passed on pve3. Development merged into main (stable)." >> $GITHUB_STEP_SUMMARY
