name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [development]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Shellcheck
        run: |
          sudo apt-get install -y shellcheck
          shellcheck databucket install.sh scripts/test.sh

      - name: Python syntax check
        run: |
          python -m py_compile mcp-server/server.py
          python -m py_compile tests/conftest.py
          python -m py_compile tests/test_mcp_server.py
          python -m py_compile tests/test_cli_e2e.py

  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      minio:
        image: minio/minio:latest
        ports:
          - 9000:9000
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        options: >-
          --health-cmd "mc ready local"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --entrypoint ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Wait for MinIO
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live; then
              echo "MinIO ready"
              exit 0
            fi
            sleep 1
          done
          echo "MinIO not ready"
          exit 1

      - name: Unit tests
        env:
          S3_ENDPOINT: http://localhost:9000
          S3_ACCESS_KEY: minioadmin
          S3_SECRET_KEY: minioadmin
        run: |
          python -m pytest tests/test_mcp_server.py -v \
            --cov=mcp-server --cov-report=term-missing

      - name: E2E tests
        env:
          S3_ENDPOINT: http://localhost:9000
          S3_ACCESS_KEY: minioadmin
          S3_SECRET_KEY: minioadmin
        run: |
          mkdir -p /tmp/databucket-test
          cp docker-compose.test.yaml /tmp/databucket-test/docker-compose.yaml
          cat > /tmp/databucket-test/.env <<EOF
          MINIO_ROOT_USER=minioadmin
          MINIO_ROOT_PASSWORD=minioadmin
          MINIO_API_PORT=9000
          MINIO_CONSOLE_PORT=9001
          EOF
          export DATABUCKET_HOME=/tmp/databucket-test
          python -m pytest tests/test_cli_e2e.py -v
